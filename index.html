<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiMagicDungeonWeb — Vibe Jam 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: monospace; }
  #game-canvas { display: block; }
  #hud {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  #health-bar-wrap {
    position: absolute; top: 20px; left: 20px;
    background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 4px;
  }
  #health-label { color: #aaa; font-size: 11px; margin-bottom: 4px; }
  #health-bar-bg { width: 160px; height: 10px; background: #333; border-radius: 2px; }
  #health-bar { height: 10px; background: #e44; border-radius: 2px; transition: width 0.2s; }
  #arrived-from {
    position: absolute; top: 20px; right: 20px;
    background: rgba(0,0,0,0.6); color: #0f0; padding: 6px 12px;
    border-radius: 4px; font-size: 12px; display: none;
  }
  #portal-hint {
    position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(0,255,0,0.15); color: #0f0; padding: 8px 20px;
    border-radius: 4px; font-size: 14px; border: 1px solid #0f0;
    display: none; text-align: center;
  }
  #spells {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px;
  }
  .spell-slot {
    width: 60px; height: 60px; background: rgba(0,0,0,0.7);
    border: 2px solid #555; border-radius: 6px; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    color: #ccc; font-size: 10px; text-align: center; gap: 3px;
  }
  .spell-slot .spell-icon { font-size: 20px; }
  .spell-slot.cooling { border-color: #333; opacity: 0.5; }
  .spell-slot.ready { border-color: #888; }
  #name-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.92); display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 100; color: #fff;
  }
  #name-screen h1 { font-size: 32px; margin-bottom: 8px; color: #a55; }
  #name-screen p { color: #888; margin-bottom: 32px; font-size: 14px; }
  #name-input {
    background: #111; border: 1px solid #555; color: #fff;
    padding: 10px 16px; font-size: 16px; font-family: monospace;
    border-radius: 4px; width: 240px; text-align: center;
  }
  #name-btn {
    margin-top: 12px; padding: 10px 32px; background: #a55;
    border: none; color: #fff; font-size: 15px; font-family: monospace;
    border-radius: 4px; cursor: pointer;
  }
  #name-btn:hover { background: #c66; }
  #crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.7); font-size: 18px; user-select: none;
  }
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<div id="hud">
  <div id="health-bar-wrap">
    <div id="health-label">HP</div>
    <div id="health-bar-bg"><div id="health-bar" style="width:100%"></div></div>
  </div>
  <div id="arrived-from"></div>
  <div id="portal-hint">⬆ VIBE JAM 2026 PORTAL — walk in to travel</div>
  <div id="spells">
    <div class="spell-slot ready" id="spell-0">
      <span class="spell-icon">🔥</span>
      <span>Fireball</span>
      <span style="color:#888;font-size:9px">LClick</span>
    </div>
    <div class="spell-slot ready" id="spell-1">
      <span class="spell-icon">❄️</span>
      <span>Frostbolt</span>
      <span style="color:#888;font-size:9px">RClick</span>
    </div>
    <div class="spell-slot ready" id="spell-2">
      <span class="spell-icon">🌀</span>
      <span>Telekinesis</span>
      <span style="color:#888;font-size:9px">E</span>
    </div>
  </div>
  <div id="crosshair">+</div>
</div>

<div id="name-screen">
  <h1>MultiMagicDungeonWeb</h1>
  <p>Vibe Jam 2026 — Build dungeons. Raid others. Duel with spells.</p>
  <input id="name-input" type="text" placeholder="Enter your name" maxlength="20" />
  <button id="name-btn">Enter Dungeon</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// MultiMagicDungeonWeb — Vibe Jam 2026
// Phase 0 skeleton: Three.js dungeon + portal system + spell stubs
// ============================================================

const PORTAL_EXIT_URL = 'https://jam.pieter.com/portal/2026';
const PORTAL_PRELOAD_DIST = 50;
const PORTAL_ENTER_DIST = 18;
const START_PORTAL_DELAY_MS = 5000;
const PLAYER_SPEED = 0.18;
const PLAYER_HEIGHT = 5;
const HP_MAX = 100;

// ---- URL params ----
const urlParams = new URLSearchParams(window.location.search);
const incomingPortal = urlParams.get('portal') === 'true';
const incomingRef    = urlParams.get('ref') || '';
const incomingUser   = urlParams.get('username') || '';
const incomingColor  = urlParams.get('color') || 'white';
const incomingSpeed  = parseFloat(urlParams.get('speed')) || PLAYER_SPEED;
const incomingHp     = parseInt(urlParams.get('hp')) || HP_MAX;

// ---- State ----
let playerName = incomingUser || 'Wizard';
let playerHp   = incomingHp;
let portalPreloaded = false;
let startPortalReady = false;  // becomes true after delay
let gameStarted = false;

// ---- Three.js setup ----
const canvas   = document.getElementById('game-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setSize(window.innerWidth, window.innerHeight);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0a0608);
scene.fog = new THREE.Fog(0x0a0608, 30, 200);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, PLAYER_HEIGHT, 0);

// ---- Lighting ----
const ambient = new THREE.AmbientLight(0x221122, 0.6);
scene.add(ambient);
const torch1 = new THREE.PointLight(0xff6600, 1.5, 60);
torch1.position.set(20, 10, 20);
scene.add(torch1);
const torch2 = new THREE.PointLight(0x4444ff, 1.0, 60);
torch2.position.set(-30, 10, -20);
scene.add(torch2);
const dirLight = new THREE.DirectionalLight(0xffeedd, 0.4);
dirLight.position.set(0, 40, 0);
scene.add(dirLight);

// ---- Materials ----
const stoneMat  = new THREE.MeshPhongMaterial({ color: 0x4a4055, shininess: 5 });
const floorMat  = new THREE.MeshPhongMaterial({ color: 0x2a2030, shininess: 2 });
const ceilingMat = new THREE.MeshPhongMaterial({ color: 0x1a1020, shininess: 0 });

// ---- Dungeon geometry ----
function buildDungeon() {
  const rooms = [
    { x: 0,   z: 0,   w: 80, d: 60 },   // main hall
    { x: 80,  z: 0,   w: 50, d: 40 },   // east wing
    { x: -80, z: 0,   w: 50, d: 40 },   // west wing
    { x: 0,   z: -80, w: 60, d: 50 },   // north chamber
  ];

  rooms.forEach(room => {
    // Floor
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(room.w, room.d), floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.set(room.x, 0, room.z);
    scene.add(floor);

    // Ceiling
    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(room.w, room.d), ceilingMat);
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.set(room.x, 20, room.z);
    scene.add(ceiling);

    // Walls (4 sides)
    const wallH = 20;
    const walls = [
      { pos: [room.x, wallH/2, room.z - room.d/2], rot: [0,0,0], size: [room.w, wallH] },
      { pos: [room.x, wallH/2, room.z + room.d/2], rot: [0, Math.PI, 0], size: [room.w, wallH] },
      { pos: [room.x - room.w/2, wallH/2, room.z], rot: [0, Math.PI/2, 0], size: [room.d, wallH] },
      { pos: [room.x + room.w/2, wallH/2, room.z], rot: [0, -Math.PI/2, 0], size: [room.d, wallH] },
    ];
    walls.forEach(w => {
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(...w.size), stoneMat);
      mesh.position.set(...w.pos);
      mesh.rotation.set(...w.rot);
      scene.add(mesh);
    });
  });

  // Connecting corridors
  const corridors = [
    { x: 45, z: 0, w: 30, d: 15 },
    { x: -45, z: 0, w: 30, d: 15 },
    { x: 0, z: -45, w: 15, d: 30 },
  ];
  corridors.forEach(c => {
    const f = new THREE.Mesh(new THREE.PlaneGeometry(c.w, c.d), floorMat);
    f.rotation.x = -Math.PI / 2;
    f.position.set(c.x, 0, c.z);
    scene.add(f);
    const ce = new THREE.Mesh(new THREE.PlaneGeometry(c.w, c.d), ceilingMat);
    ce.rotation.x = Math.PI / 2;
    ce.position.set(c.x, 20, c.z);
    scene.add(ce);
  });

  // Some pillars for atmosphere
  const pillarMat = new THREE.MeshPhongMaterial({ color: 0x3a3045 });
  const pillarGeo = new THREE.CylinderGeometry(1.5, 2, 20, 8);
  const pillarPos = [
    [15, 10, 15], [-15, 10, 15], [15, 10, -15], [-15, 10, -15],
  ];
  pillarPos.forEach(p => {
    const mesh = new THREE.Mesh(pillarGeo, pillarMat);
    mesh.position.set(...p);
    scene.add(mesh);
  });
}

buildDungeon();

// ---- Portal helper ----
function makeLabelCanvas(text) {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, 256, 64);
  ctx.font = 'bold 22px monospace';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText(text, 128, 40);
  return canvas;
}

function createPortal(color, position, label) {
  const group = new THREE.Group();
  group.position.copy(position);
  group.rotation.x = 0.35;

  // Ring
  const torus = new THREE.Mesh(
    new THREE.TorusGeometry(15, 2, 16, 100),
    new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.6,
      transparent: true, opacity: 0.85 })
  );
  group.add(torus);

  // Inner fill
  const inner = new THREE.Mesh(
    new THREE.CircleGeometry(13, 32),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
  );
  group.add(inner);

  // Label
  if (label) {
    const tex = new THREE.CanvasTexture(makeLabelCanvas(label));
    const labelMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 7),
      new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide })
    );
    labelMesh.position.set(0, 20, 0);
    group.add(labelMesh);
  }

  // Point light inside portal
  const glow = new THREE.PointLight(color, 1.5, 40);
  glow.position.set(0, 0, 0);
  group.add(glow);

  scene.add(group);
  return group;
}

// Exit portal (always present)
const exitPortalGroup = createPortal(0x00ff00, new THREE.Vector3(-200, 20, -80), 'VIBE JAM 2026');
let startPortalGroup = null;

// Start portal (only when arriving from another game)
if (incomingPortal && incomingRef) {
  startPortalGroup = createPortal(0xff0000, new THREE.Vector3(0, 20, 30), null);
  setTimeout(() => { startPortalReady = true; }, START_PORTAL_DELAY_MS);
}

// ---- Player movement ----
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

let yaw = 0, pitch = 0;
let isLocked = false;

canvas.addEventListener('click', () => {
  if (gameStarted) canvas.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === canvas;
});

document.addEventListener('mousemove', e => {
  if (!isLocked) return;
  yaw   -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch));
});

function movePlayer() {
  if (!isLocked) return;
  const dir = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp'])    dir.z -= 1;
  if (keys['KeyS'] || keys['ArrowDown'])  dir.z += 1;
  if (keys['KeyA'] || keys['ArrowLeft'])  dir.x -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) dir.x += 1;
  dir.normalize().multiplyScalar(PLAYER_SPEED * 5);
  dir.applyEuler(new THREE.Euler(0, yaw, 0));
  camera.position.add(dir);
  camera.position.y = PLAYER_HEIGHT;
  camera.rotation.set(pitch, yaw, 0, 'YXZ');
}

// ---- Spells ----
const spellProjectiles = [];
const cooldowns = { fireball: 0, frostbolt: 0, telekinesis: 0 };

class MmdSpell {
  constructor(type, position, direction) {
    this.type = type;
    this.alive = true;
    this.life = 0;
    this.maxLife = type === 'frostbolt' ? 120 : 80;
    this.speed = type === 'frostbolt' ? 0.4 : 0.7;

    const colors = { fireball: 0xff6600, frostbolt: 0x44aaff, telekinesis: 0xaa44ff };
    const sizes  = { fireball: 0.8, frostbolt: 0.6, telekinesis: 1.0 };

    this.mesh = new THREE.Mesh(
      new THREE.SphereGeometry(sizes[type], 8, 8),
      new THREE.MeshBasicMaterial({ color: colors[type] })
    );
    this.mesh.position.copy(position);
    this.direction = direction.clone().normalize();
    scene.add(this.mesh);

    const light = new THREE.PointLight(colors[type], 1.5, 20);
    this.mesh.add(light);
  }

  update() {
    this.mesh.position.addScaledVector(this.direction, this.speed);
    this.life++;
    if (this.life > this.maxLife) this.destroy();
    // Basic wall collision (simple bounds check)
    if (Math.abs(this.mesh.position.x) > 110 || Math.abs(this.mesh.position.z) > 110) {
      this.destroy();
    }
  }

  destroy() {
    this.alive = false;
    scene.remove(this.mesh);
  }
}

function castSpell(type) {
  if (cooldowns[type] > 0) return;
  const dir = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation);
  const pos = camera.position.clone().addScaledVector(dir, 3);
  spellProjectiles.push(new MmdSpell(type, pos, dir));
  const cd = { fireball: 40, frostbolt: 60, telekinesis: 90 };
  cooldowns[type] = cd[type];
}

document.addEventListener('mousedown', e => {
  if (!isLocked) return;
  if (e.button === 0) castSpell('fireball');
  if (e.button === 2) castSpell('frostbolt');
  e.preventDefault();
});
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.code === 'KeyE' && isLocked) castSpell('telekinesis');
});

// ---- HUD ----
function updateHud() {
  document.getElementById('health-bar').style.width = playerHp + '%';
  ['fireball','frostbolt','telekinesis'].forEach((s, i) => {
    const el = document.getElementById('spell-' + i);
    el.classList.toggle('cooling', cooldowns[s] > 0);
    el.classList.toggle('ready', cooldowns[s] === 0);
  });
}

// ---- Portal distance checks ----
const portalHintEl = document.getElementById('portal-hint');

function checkPortals() {
  const pos = camera.position;

  // Exit portal
  const exitPos = exitPortalGroup.position;
  const distExit = pos.distanceTo(exitPos);

  if (distExit < PORTAL_PRELOAD_DIST && !portalPreloaded) {
    portalPreloaded = true;
    const iframe = document.createElement('iframe');
    iframe.src = PORTAL_EXIT_URL;
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
  }

  if (distExit < PORTAL_PRELOAD_DIST * 1.5) {
    portalHintEl.style.display = 'block';
  } else {
    portalHintEl.style.display = 'none';
  }

  if (distExit < PORTAL_ENTER_DIST) {
    travelToPortal();
  }

  // Start portal (back to origin game)
  if (startPortalGroup && startPortalReady) {
    const startPos = startPortalGroup.position;
    const distStart = pos.distanceTo(startPos);
    if (distStart < PORTAL_ENTER_DIST) {
      returnToOrigin();
    }
  }
}

function travelToPortal() {
  const params = new URLSearchParams();
  params.set('portal', 'true');
  params.set('ref', window.location.hostname || 'multimagicdungeonweb');
  params.set('username', playerName);
  params.set('color', 'white');
  params.set('speed', (PLAYER_SPEED * 5).toFixed(2));
  params.set('hp', Math.round(playerHp).toString());
  window.location.href = PORTAL_EXIT_URL + '?' + params.toString();
}

function returnToOrigin() {
  if (!incomingRef) return;
  const params = new URLSearchParams();
  params.set('portal', 'true');
  params.set('username', playerName);
  params.set('color', incomingColor);
  params.set('speed', (PLAYER_SPEED * 5).toFixed(2));
  params.set('hp', Math.round(playerHp).toString());
  const scheme = incomingRef.startsWith('localhost') ? 'http' : 'https';
  window.location.href = scheme + '://' + incomingRef + '/?' + params.toString();
}

// ---- Portal animation ----
let tick = 0;
function animatePortals() {
  tick += 0.02;
  exitPortalGroup.rotation.z = tick * 0.3;
  if (startPortalGroup) startPortalGroup.rotation.z = -tick * 0.3;
}

// ---- Start game ----
function startGame(name) {
  playerName = name || playerName;
  gameStarted = true;
  document.getElementById('name-screen').style.display = 'none';
  canvas.requestPointerLock();

  if (incomingRef) {
    const el = document.getElementById('arrived-from');
    el.style.display = 'block';
    el.textContent = 'Arrived from: ' + incomingRef;
    setTimeout(() => { el.style.display = 'none'; }, 6000);
  }
}

// Name screen
document.getElementById('name-btn').addEventListener('click', () => {
  startGame(document.getElementById('name-input').value.trim());
});
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame(document.getElementById('name-input').value.trim());
});

// If arriving via portal, skip name screen
if (incomingPortal) {
  startGame(incomingUser);
}

// ---- Window resize ----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---- Game loop ----
function gameLoop() {
  requestAnimationFrame(gameLoop);

  if (!gameStarted) { renderer.render(scene, camera); return; }

  movePlayer();

  // Update spells
  for (let i = spellProjectiles.length - 1; i >= 0; i--) {
    spellProjectiles[i].update();
    if (!spellProjectiles[i].alive) spellProjectiles.splice(i, 1);
  }

  // Cooldowns
  Object.keys(cooldowns).forEach(k => { if (cooldowns[k] > 0) cooldowns[k]--; });

  // Portal torch flicker
  torch1.intensity = 1.3 + Math.sin(tick * 7) * 0.2;
  torch2.intensity = 0.9 + Math.sin(tick * 5 + 1) * 0.15;

  checkPortals();
  animatePortals();
  updateHud();

  renderer.render(scene, camera);
}

gameLoop();

// Expose for debugging
window.game = { camera, scene, renderer, playerName, playerHp };
</script>
</body>
</html>
