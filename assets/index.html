<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MultiMagicDungeonWeb Assets</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #0b0f1a; color: #e6f2ff; overflow: hidden; }
  #layout { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
  #sidebar { padding: 16px; border-right: 1px solid #223047; background: #0e1424; }
  #sidebar h1 { font-size: 16px; margin-bottom: 12px; }
  #sidebar p { color: #9db4d8; font-size: 12px; margin-bottom: 14px; }
  #asset-list { display: flex; flex-direction: column; gap: 8px; }
  .asset-btn { text-align: left; border: 1px solid #35507a; background: #14203a; color: #e6f2ff; border-radius: 6px; padding: 10px; cursor: pointer; }
  .asset-btn.active { background: #1f2f56; border-color: #6ca4ff; }
  #meta { margin-top: 14px; font-size: 12px; color: #a8c1ea; line-height: 1.4; }
  #viewer { width: 100%; height: 100%; }
  #hint { position: fixed; bottom: 12px; right: 16px; font-size: 12px; color: #b6caf0; background: rgba(9,14,26,0.8); padding: 6px 10px; border-radius: 5px; border: 1px solid #2f4365; }
</style>
</head>
<body>
<div id="layout">
  <aside id="sidebar">
    <h1>Asset Viewer</h1>
    <p>Use this page to quickly inspect voxel models under <b>/assets</b>.</p>
    <div id="asset-list"></div>
    <div id="meta"></div>
  </aside>
  <div id="viewer"></div>
</div>
<div id="hint">Drag = orbit · Wheel = zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const VOXEL_DRAGON_PALETTE = {
  body:    0x0f2134,
  shadow:  0x08131f,
  cyan:    0x1b9bb3,
  horn:    0xbe9d83,
  claw:    0xead8bc,
  eye:     0x0a0a0a,
  eyeGold: 0xffd700,
  eyeWhite:0xeeeeee,
  nostril: 0x050a10,
  mouth:   0x1a0505,
  scale:   0x122a44,
};
function buildVoxelDragonVoxels() {
  const v = [];
  const add = (x, y, z, c) => v.push([x, y, z, c]);

  // === BODY (x=-3..3) — chunky torso ===
  for (let x = -3; x <= 3; x++)
    for (let y = 3; y <= 6; y++)
      for (let z = -2; z <= 2; z++)
        if (Math.abs(x) + Math.abs(z) <= 6) add(x, y, z, 'body');
  // Belly cyan stripe
  for (let x = -2; x <= 2; x++)
    for (let z = -1; z <= 1; z++) add(x, 3, z, 'cyan');
  // Dorsal spine ridges
  for (let x = -3; x <= 6; x += 2) add(x, 7, 0, 'horn');
  // Shoulder bulk (wing attachment)
  for (let z of [-3, 3]) { add(-1, 6, z, 'body'); add(0, 6, z, 'body'); add(1, 6, z, 'body'); }
  for (let z of [-3, 3]) { add(-1, 5, z, 'body'); add(0, 5, z, 'body'); }
  // Scale detail on flanks
  for (let x = -2; x <= 2; x += 2) { add(x, 4, -2, 'scale'); add(x, 4, 2, 'scale'); }

  // === NECK (x=4..6) — muscular ===
  for (let i = 0; i < 3; i++) {
    const x = 4 + i;
    for (let y = 4; y <= 7; y++)
      for (let z = -1; z <= 1; z++) add(x, y, z, 'body');
    if (i < 2) { add(x, 5, -2, 'body'); add(x, 5, 2, 'body'); add(x, 6, -2, 'body'); add(x, 6, 2, 'body'); }
    add(x, 4, 0, 'cyan');
  }

  // === HEAD — skull + brow + snout + jaw ===
  // Skull back (x=7): wide cranium
  for (let y = 4; y <= 7; y++)
    for (let z = -2; z <= 2; z++) add(7, y, z, 'body');
  for (let z = -1; z <= 1; z++) add(7, 8, z, 'body');

  // Mid skull (x=8): cheekbones + temporal ridge
  for (let y = 4; y <= 7; y++)
    for (let z = -2; z <= 2; z++) add(8, y, z, 'body');
  add(8, 7, -3, 'body'); add(8, 7, 3, 'body');

  // Heavy brow ridge — shadow colored, overhangs eyes
  for (let z = -3; z <= 3; z++) add(8, 8, z, 'shadow');
  for (let z = -2; z <= 2; z++) add(9, 8, z, 'shadow');
  add(10, 8, -1, 'shadow'); add(10, 8, 0, 'shadow'); add(10, 8, 1, 'shadow');

  // Upper snout (x=9..10): wide reptilian muzzle
  for (let y = 6; y <= 7; y++)
    for (let z = -2; z <= 2; z++) add(9, y, z, 'body');
  for (let y = 6; y <= 7; y++)
    for (let z = -1; z <= 1; z++) add(10, y, z, 'body');
  add(10, 7, -2, 'body'); add(10, 7, 2, 'body');

  // Snout bridge (x=11): narrowing
  add(11, 7, -1, 'body'); add(11, 7, 0, 'body'); add(11, 7, 1, 'body');
  add(11, 6, -1, 'body'); add(11, 6, 0, 'body'); add(11, 6, 1, 'body');

  // Snout tip (x=12..13)
  add(12, 7, 0, 'body'); add(12, 6, 0, 'body');
  add(12, 6, -1, 'body'); add(12, 6, 1, 'body');
  // Nostril pits at very tip
  add(13, 7, -1, 'nostril'); add(13, 7, 1, 'nostril');
  add(13, 7, 0, 'body');

  // Mouth gap (y=5) — dark interior
  for (let z = -1; z <= 1; z++) { add(8, 5, z, 'mouth'); add(9, 5, z, 'mouth'); add(10, 5, z, 'mouth'); }

  // Lower jaw (y=4) — separated from upper jaw
  for (let z = -2; z <= 2; z++) add(7, 4, z, 'body');
  for (let z = -2; z <= 2; z++) add(8, 4, z, 'body');
  for (let z = -1; z <= 1; z++) add(9, 4, z, 'body');
  for (let z = -1; z <= 1; z++) add(10, 4, z, 'body');
  add(11, 4, 0, 'body'); add(11, 4, -1, 'body'); add(11, 4, 1, 'body');
  for (let z = -1; z <= 1; z++) { add(8, 3, z, 'body'); add(9, 3, z, 'body'); }
  add(7, 3, 0, 'cyan'); add(8, 3, 0, 'cyan'); add(9, 3, 0, 'cyan');
  // Fangs
  add(9, 5, -2, 'claw'); add(9, 5, 2, 'claw');
  add(10, 5, -1, 'claw'); add(10, 5, 1, 'claw');

  // Eyes — gold iris, white sclera, black pupil
  add(8, 7, -3, 'eyeWhite'); add(8, 7, 3, 'eyeWhite');
  add(9, 7, -3, 'eyeGold'); add(9, 7, 3, 'eyeGold');
  add(9, 7, -2, 'eyeGold'); add(9, 7, 2, 'eyeGold');
  add(10, 7, -2, 'eye'); add(10, 7, 2, 'eye');

  // === HORNS — sweeping back from skull ===
  for (let i = 0; i < 6; i++) {
    add(7 - i, 9 + Math.floor(i * 0.7), -2 - Math.floor(i / 2), 'horn');
    add(7 - i, 9 + Math.floor(i * 0.7), 2 + Math.floor(i / 2), 'horn');
  }
  add(7, 8, -3, 'horn'); add(7, 8, 3, 'horn');
  add(8, 8, -3, 'horn'); add(8, 8, 3, 'horn');

  // === WINGS — bat-like membrane ===
  for (let side of [-1, 1]) {
    // Wing arm bone
    for (let i = 0; i < 10; i++) {
      add(-1 - i, 7 + Math.floor(i / 3), side * (4 + i), 'shadow');
      if (i < 3) add(-1 - i, 8 + Math.floor(i / 3), side * (4 + i), 'shadow');
    }
    // Wing membrane fill
    for (let i = 0; i < 9; i++) {
      const tipZ = 4 + i;
      for (let fz = 4; fz <= tipZ; fz++)
        add(-1 - i, 6, side * fz, 'shadow');
      if (i < 6)
        for (let fz = 4; fz <= Math.min(tipZ, 4 + i); fz++)
          add(-1 - i, 7, side * fz, 'shadow');
      if (i > 0 && i < 8) add(-1 - i, 5, side * tipZ, 'shadow');
    }
    // Trailing edge cyan
    for (let i = 1; i < 9; i++)
      add(-1 - i, 5, side * (4 + i), 'cyan');
    // Wing finger bones
    add(-10, 10, side * 13, 'horn');
    add(-9, 9, side * 12, 'horn');
    add(-8, 8, side * 11, 'horn');
    add(-10, 9, side * 13, 'claw');
  }

  // === LEGS — digitigrade ===
  const legs = [[-2, -2], [-2, 2], [2, -2], [2, 2]];
  for (const [x0, z0] of legs) {
    const dx = x0 > 0 ? 1 : -1;
    for (let y = 1; y <= 2; y++) {
      add(x0, y, z0, 'shadow');
      add(x0 + dx, y, z0, 'body');
      add(x0, y, z0 + (z0 > 0 ? -1 : 1), 'body');
    }
    add(x0, 0, z0, 'shadow'); add(x0 + dx, 0, z0, 'body');
    add(x0, -1, z0, 'claw'); add(x0 + dx, -1, z0, 'claw');
    add(x0, -1, z0 + (z0 > 0 ? 1 : -1), 'claw');
  }

  // === TAIL — sinuous with spade ===
  for (let i = 0; i < 11; i++) {
    const x = -4 - i, y = 4 + Math.floor(i / 3);
    const zOff = Math.round(Math.sin(i * 0.5) * 0.8);
    add(x, y, zOff, 'body');
    if (i < 6) { add(x, y, zOff - 1, 'body'); add(x, y, zOff + 1, 'body'); }
    if (i < 3) add(x, y + 1, zOff, 'body');
    if (i % 2 === 0) add(x, y - 1, zOff, 'cyan');
    if (i < 8 && i % 2 === 0) add(x, y + 1, zOff, 'horn');
  }
  // Tail spade — diamond
  add(-15, 7, 0, 'shadow');
  add(-16, 7, -1, 'claw'); add(-16, 7, 1, 'claw');
  add(-16, 8, 0, 'claw'); add(-16, 6, 0, 'claw');
  add(-16, 7, 0, 'claw'); add(-17, 7, 0, 'claw');

  return v;
}
function createVoxelAsset(voxels, { cubeSize = 0.55, palette = VOXEL_DRAGON_PALETTE } = {}) {
  const byColor = new Map();
  for (const [x, y, z, color] of voxels) {
    if (!byColor.has(color)) byColor.set(color, []);
    byColor.get(color).push([x, y, z]);
  }
  const root = new THREE.Group();
  const geo = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
  for (const [color, pts] of byColor) {
    const mesh = new THREE.InstancedMesh(geo, new THREE.MeshToonMaterial({ color: palette[color] }), pts.length);
    const m = new THREE.Matrix4();
    pts.forEach(([x, y, z], i) => { m.setPosition(x * cubeSize, y * cubeSize, z * cubeSize); mesh.setMatrixAt(i, m); });
    mesh.instanceMatrix.needsUpdate = true;
    root.add(mesh);
  }
  return root;
}

const VOXEL_WIZARD_PALETTE = {
  robe:  0x6B21A8,
  hat:   0x3B0764,
  skin:  0xE8D5B0,
  eye:   0x111111,
  staff: 0x8B4513,
};
function buildVoxelWizardVoxels() {
  const v = [];
  const add = (x, y, z, c) => v.push([x, y, z, c]);
  // Pointed hat — 4 stacked layers (top to base: 1×1, 2×2, 3×3, 4×4)
  add(0, 15, 0, 'hat');
  for (let x = -1; x <= 0; x++)
    for (let z = -1; z <= 0; z++) add(x, 14, z, 'hat');
  for (let x = -1; x <= 1; x++)
    for (let z = -1; z <= 1; z++) add(x, 13, z, 'hat');
  for (let x = -2; x <= 1; x++)
    for (let z = -2; z <= 1; z++) add(x, 12, z, 'hat');
  // Head — 3×3×2 block
  for (let x = -1; x <= 1; x++)
    for (let y = 10; y <= 11; y++)
      for (let z = -1; z <= 1; z++) add(x, y, z, 'skin');
  // Eyes on front face
  add(-1, 11, -2, 'eye'); add(1, 11, -2, 'eye');
  // Robe — 3×5×2 torso
  for (let x = -1; x <= 1; x++)
    for (let y = 5; y <= 9; y++)
      for (let z = 0; z <= 1; z++) add(x, y, z, 'robe');
  // Lower robe + flared bottom row (wider base)
  for (let x = -1; x <= 1; x++)
    for (let y = 2; y <= 4; y++) add(x, y, 0, 'robe');
  for (let z = 0; z <= 1; z++) {
    add(-2, 0, z, 'robe'); add(-2, 1, z, 'robe');
    add(2, 0, z, 'robe'); add(2, 1, z, 'robe');
  }
  for (let x = -1; x <= 1; x++)
    for (let z = 0; z <= 1; z++) { add(x, 0, z, 'robe'); add(x, 1, z, 'robe'); }
  // Arms — 4 cubes each side, hanging down
  for (let y = 5; y <= 8; y++) { add(-2, y, 0, 'skin'); add(2, y, 0, 'skin'); }
  // Staff — 6 cubes vertical in right hand
  for (let y = 4; y <= 9; y++) add(3, y, 0, 'staff');
  return v;
}

const assetDefs = [{
  id: 'dragon-azure',
  name: 'Azure Horn Dragon',
  description: 'Primary voxel enemy inspired by reference dragon; dark body with cyan markings and tan horns.',
  voxels: buildVoxelDragonVoxels,
  cubeSize: 0.5,
}, {
  id: 'voxel-wizard',
  name: 'Voxel Wizard',
  description: 'Remote player wizard; robe color varies per player via hashColor. Default shown in royal purple.',
  voxels: buildVoxelWizardVoxels,
  cubeSize: 0.5,
  palette: VOXEL_WIZARD_PALETTE,
}];

const sidebarList = document.getElementById('asset-list');
const meta = document.getElementById('meta');
const viewer = document.getElementById('viewer');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x6ea9ee);
const camera = new THREE.PerspectiveCamera(58, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
camera.position.set(20, 15, 20);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(viewer.clientWidth, viewer.clientHeight);
viewer.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
keyLight.position.set(15, 30, 20);
scene.add(keyLight);
const ground = new THREE.Mesh(new THREE.CircleGeometry(22, 64), new THREE.MeshStandardMaterial({ color: 0x5d8fd8, roughness: 0.9 }));
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 4, 0);
controls.update();

let activeModel = null;
function selectAsset(def) {
  if (activeModel) scene.remove(activeModel);
  activeModel = createVoxelAsset(def.voxels(), { cubeSize: def.cubeSize, palette: def.palette || VOXEL_DRAGON_PALETTE });
  activeModel.position.y = 0.6;
  scene.add(activeModel);
  meta.innerHTML = `<b>${def.name}</b><br/>Voxel count: ${def.voxels().length}<br/>${def.description}`;
  [...sidebarList.querySelectorAll('button')].forEach(btn => btn.classList.toggle('active', btn.dataset.id === def.id));
}

for (const def of assetDefs) {
  const btn = document.createElement('button');
  btn.className = 'asset-btn';
  btn.dataset.id = def.id;
  btn.textContent = def.name;
  btn.addEventListener('click', () => selectAsset(def));
  sidebarList.appendChild(btn);
}
selectAsset(assetDefs[0]);

window.addEventListener('resize', () => {
  camera.aspect = viewer.clientWidth / viewer.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(viewer.clientWidth, viewer.clientHeight);
});

function animate() {
  requestAnimationFrame(animate);
  if (activeModel) activeModel.rotation.y += 0.007;
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
